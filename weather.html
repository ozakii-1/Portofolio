<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather & Clock</title>
  <link rel="stylesheet" href="weather.css" />
</head>
<body>

  <!-- RED BUBBLES -->
  <div class="bubble bubble-1"></div>
  <div class="bubble bubble-2"></div>

  <!-- NAVBAR -->
  <nav>
    <a class="logo" href="index.html">← Wassim.</a>
    <div class="nav-title">Weather & Clock</div>
  </nav>

  <!-- MAIN -->
  <main>

    <!-- CLOCK -->
    <div class="clock-card">
      <div class="clock-time" id="clock-time">00:00:00</div>
      <div class="clock-date" id="clock-date">Monday, 1 January 2025</div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <input type="text" id="city-input" placeholder="Enter a city..." />
      <button id="search-btn">Search</button>
    </div>

    <!-- WEATHER CARD -->
    <div class="weather-card" id="weather-card">
      <div class="weather-placeholder" id="weather-placeholder">
        <p>Search for a city to see the weather</p>
      </div>

      <div class="weather-data" id="weather-data" style="display:none;">
        <div class="weather-top">
          <div class="weather-city" id="weather-city">—</div>
          <div class="weather-country" id="weather-country">—</div>
        </div>
        <div class="weather-main">
          <img id="weather-icon" src="" alt="weather icon" />
          <div class="weather-temp" id="weather-temp">—</div>
        </div>
        <div class="weather-desc" id="weather-desc">—</div>
        <div class="weather-details">
          <div class="detail-item">
            <span class="detail-label">Feels Like</span>
            <span class="detail-value" id="feels-like">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Humidity</span>
            <span class="detail-value" id="humidity">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Wind</span>
            <span class="detail-value" id="wind">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Pressure</span>
            <span class="detail-value" id="pressure">—</span>
          </div>
        </div>
      </div>

      <div class="weather-error" id="weather-error" style="display:none;">
        <p>City not found. Try again.</p>
      </div>
    </div>

  </main>

  <script>
    const API_KEY = '76689f19726d25b9c2f66b6de164dc0d';

    // ── CLOCK ──
    function updateClock() {
      const now = new Date();
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;

      const day = days[now.getDay()];
      const date = now.getDate();
      const month = months[now.getMonth()];
      const year = now.getFullYear();
      document.getElementById('clock-date').textContent = `${day}, ${date} ${month} ${year}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── WEATHER ──
    async function getWeather(city) {
      const data = document.getElementById('weather-data');
      const placeholder = document.getElementById('weather-placeholder');
      const error = document.getElementById('weather-error');

      data.style.display = 'none';
      placeholder.style.display = 'none';
      error.style.display = 'none';

      try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);
        const json = await res.json();

        if (json.cod !== 200) {
          error.style.display = 'block';
          return;
        }

        document.getElementById('weather-city').textContent = json.name;
        document.getElementById('weather-country').textContent = json.sys.country;
        document.getElementById('weather-temp').textContent = Math.round(json.main.temp) + '°C';
        document.getElementById('weather-desc').textContent = json.weather[0].description;
        document.getElementById('feels-like').textContent = Math.round(json.main.feels_like) + '°C';
        document.getElementById('humidity').textContent = json.main.humidity + '%';
        document.getElementById('wind').textContent = Math.round(json.wind.speed) + ' m/s';
        document.getElementById('pressure').textContent = json.main.pressure + ' hPa';
        document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${json.weather[0].icon}@2x.png`;

        data.style.display = 'block';
      } catch (e) {
        error.style.display = 'block';
      }
    }

    document.getElementById('search-btn').addEventListener('click', () => {
      const city = document.getElementById('city-input').value.trim();
      if (city) getWeather(city);
    });

    document.getElementById('city-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const city = document.getElementById('city-input').value.trim();
        if (city) getWeather(city);
      }
    });
  </script>

</body>
</html>
